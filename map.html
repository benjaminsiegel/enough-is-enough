<style>
  html,body{margin:0;padding:0;height:100%;background:#1A1B1D;}
  #map{position:absolute;inset:0;}
  .maphead{
    position:absolute;top:0;left:0;right:0;z-index:1000;
    background:rgba(26,27,29,.92);
    color:#fff;text-align:center;
    padding:.85rem 3rem;
    font-family:'Archivo',sans-serif;
    pointer-events:none;
  }
  .maphead h1{
    margin:0;font-family:'Archivo Black',sans-serif;
    font-size:1.05rem;letter-spacing:.02em;text-transform:uppercase;
  }
  .maphead p{
    margin:.15rem 0 0;font-size:.72rem;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(255,255,255,.55);
  }
  .maphead .u{color:#F2B705;}
  /* popups in the site's register */
  .leaflet-popup-content-wrapper{
    background:#FFFFFF;color:#141414;border-radius:0;
    box-shadow:0 4px 18px rgba(0,0,0,.5);
  }
  .leaflet-popup-tip{background:#FFFFFF;}
  .leaflet-popup-content{margin:14px 16px;font-family:'Archivo',sans-serif;}
  .pp-name{
    font-family:'Source Serif 4',serif;font-weight:600;
    font-size:1.05rem;line-height:1.3;margin:0 0 2px;
  }
  .pp-meta{font-size:.8rem;color:#565A5E;margin:0;line-height:1.5;}
  .pp-rule{width:26px;height:3px;background:#F2B705;margin:7px 0 6px;}
  .pp-loc{font-size:.8rem;color:#141414;margin:0;line-height:1.45;}
  .leaflet-container{background:#1A1B1D;font-family:'Archivo',sans-serif;}
  .leaflet-control-attribution{background:rgba(26,27,29,.7)!important;color:#8A8D91!important;}
  .leaflet-control-attribution a{color:#B8BBBE!important;}
</style>
</head>
<body>

<div id="map"></div>

var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function fmtDate(d){var p=d.split("-");return MONTHS[parseInt(p[1],10)-1]+" "+parseInt(p[2],10)+", "+p[0];}

var map=L.map("map",{zoomControl:true,scrollWheelZoom:true});
map.zoomControl.setPosition("bottomright");
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom:19
}).addTo(map);

var bounds=[];
var louisaMarker=null;
PEOPLE.forEach(function(p){
  var isL=!!p.louisa;
  var m=L.circleMarker([p.lat,p.lng],{
    radius:isL?9:6.5,
    fillColor:isL?"#F2B705":"#F2F2F0",
    fillOpacity:isL?0.95:0.85,
    color:"#1A1B1D",
    weight:1.5
  }).addTo(map);
  var name=p.n||"A neighbor";
  var meta=(p.a?("Age "+p.a+" &middot; "):"")+fmtDate(p.d);
  m.bindPopup(
    '<p class="pp-name">'+name+'</p>'+
    '<p class="pp-meta">'+meta+'</p>'+
    '<div class="pp-rule"></div>'+
    '<p class="pp-loc">'+p.loc+'</p>',
    {closeButton:true,maxWidth:260}
  );
  bounds.push([p.lat,p.lng]);
  if(isL)louisaMarker=m;
});

map.fitBounds(bounds,{padding:[60,40]});
window.focusLouisa=function(){
  if(!louisaMarker)return;
  map.invalidateSize({animate:false});
  map.setView(louisaMarker.getLatLng(),13,{animate:false});
  louisaMarker.openPopup();
};
</script>
</body>
</html>
